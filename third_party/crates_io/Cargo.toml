[package]
name = "rust_crates"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[lib]
path = "fake.rs"

[dependencies]
anyhow = "1.0.98"
arrayvec = { version = "0.7.6", default-features = false }
bitfield-struct = "0.11.0"
bitflags = "2.9.1"
byteorder = "1.5.0"
cfg-if = "1.0.0"
clap = { version = "4.5.40", features = ["derive", "env", "wrap_help"] }
clap-num = "1.2.0"
compiler_builtins = { version = "0.1.160", features = ["no-f16-f128"] }
embedded-io = "0.6.1"
hashlink = { version = "0.10.0", features = ["serde", "serde_impl"] }
minijinja = { version = "2.12.0", features = ["loader"] }
memoffset = "0.9.1"
nom = "7.1.3"
num-derive = "0.4.2"
num-traits = "0.2.19"
object = { version = "0.37.1", features = ["build", "elf", "read", "write"] }
panic-halt = "1.0.0"
paste = "1.0.15"
prettyplease = "0.2.29"
proc-macro2 = "1.0.104"
quote = "1.0.38"
riscv = "0.12.1"
riscv-rt = "0.12.2"
riscv-semihosting = "0.1.3"
rustc-demangle = "0.1.25"
riscv-csr = { git = "https://github.com/tock/tock.git", rev = "release-2.2" }
rv32i = { git = "https://github.com/tock/tock.git", rev = "release-2.2" }
same-file = "1.0.6"
serde = { version = "1.0.219", default-features = false, features = ["derive"] }
serde_derive = "1.0.228"
serde_json5 = "0.2.1"
serde_json = "1.0.138"
serde-hjson = "1.1.0"
syn = { version = "2.0.104", features = ["full", "extra-traits"] }
syn1 = { package = "syn", version = "1.0.109", features = ["full", "extra-traits"] }
toml = "0.8.23"
ufmt = "0.2.0"
ureg = "0.1.0"
uuid = { version = "1.10.0", features = ["serde", "v4"] }
bitfield = "0.14.0"
chrono = { version = "0.4.38", features = ["serde"] }
crossterm = "0.28.1"
ctrlc = "3.4.5"
fips204 = "0.4.6"
gdbstub = "0.6.3"
gdbstub_arch = "0.2.4"
hex = "0.4.3"
simple_logger = "5.0.0"
smlang = { version = "0.8.0", default-features = false }
strum = "0.24"
strum_macros = "0.24"
subst = "0.3.1"
tempfile = "3.14.0"
walkdir = "2.5.0"
cc = "1.2.15"
constant_time_eq = { version = "0.4.2", default-features = false }
tock-registers = "0.9.0"
ecdsa = { version = "0.16.9", features = ["pem"] }
log = "0.4.26"
semver = "1.0.23"
elf = "0.7.4"
lazy_static = "1.4.0"
crc = "3.2.1"
caliptra-api = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-api-types = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-builder = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-drivers = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-error = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-image-types = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-image-crypto = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-emu-bus = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-emu-cpu = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-emu-periph = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-emu-types = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-registers = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
mcu-error = { git = "https://github.com/chipsalliance/caliptra-mcu-sw", rev = "b7e45fc139620754e8d32e70d6cc90845d1756df", default-features = false }
romtime = { git = "https://github.com/chipsalliance/caliptra-mcu-sw", rev = "b7e45fc139620754e8d32e70d6cc90845d1756df", default-features = false }
registers-generated = { git = "https://github.com/chipsalliance/caliptra-mcu-sw", rev = "b7e45fc139620754e8d32e70d6cc90845d1756df", default-features = false }

cortex-m = "0.7.7"
embedded-hal = "1.0"
embedded-hal-async = "1.0"
embedded-hal-nb = "1.0"
heapless = { version = "0.9", default-features = false }
nb = "1.0"
rand = "0.8.5"
# Pin to match Hubris ecosystem
rand_core = { version = "0.9", default-features = false }
sec1 = { version = "0.7.3" }
subtle = { version = "2", default-features = false }
zerocopy = { version = "0.8.48", default-features = false, features = ["derive"] }
zeroize = { version = "1.8", default-features = false, features = ["derive"] }

# RustCrypto ECDSA crates
p256 = { version = "0.13", default-features = false, features = ["ecdsa", "arithmetic"] }
p384 = { version = "0.13", default-features = false, features = ["ecdsa", "arithmetic"] }
k256 = { version = "0.13", default-features = false, features = ["ecdsa", "arithmetic"] }

# RustCrypto digest crates
sha2 = { version = "0.10", default-features = false }
sha3 = { version = "0.10", default-features = false }

# RustCrypto MAC crates
hmac = { version = "0.12", default-features = false }

# RustCrypto cipher crates
aes = { version = "0.8", default-features = false }
ctr = { version = "0.9", default-features = false }
aes-gcm = { version = "0.10", default-features = false, features = ["aes"] }
cipher = { version = "0.4", default-features = false }

[patch.crates-io]
# Caliptra SW patches
caliptra-api = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-api-types = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-builder = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-drivers = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-emu-bus = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-emu-cpu = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-emu-periph = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-emu-types = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-image-types = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-registers = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
ureg = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-error = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }
caliptra-image-crypto = { git = "https://github.com/chipsalliance/caliptra-sw", rev = "2fe38a094bd06188714ff7c040252bc3059d9699", default-features = false }

# Caliptra MCU patches
mcu-builder = { git = "https://github.com/chipsalliance/caliptra-mcu-sw", rev = "b7e45fc139620754e8d32e70d6cc90845d1756df", default-features = false }
mcu-firmware-bundler = { git = "https://github.com/chipsalliance/caliptra-mcu-sw", rev = "b7e45fc139620754e8d32e70d6cc90845d1756df", default-features = false }
mcu-error = { git = "https://github.com/chipsalliance/caliptra-mcu-sw", rev = "b7e45fc139620754e8d32e70d6cc90845d1756df", default-features = false }
romtime = { git = "https://github.com/chipsalliance/caliptra-mcu-sw", rev = "b7e45fc139620754e8d32e70d6cc90845d1756df", default-features = false }
registers-generated = { git = "https://github.com/chipsalliance/caliptra-mcu-sw", rev = "b7e45fc139620754e8d32e70d6cc90845d1756df", default-features = false }

# Tock patches
tock-registers = { git = "https://github.com/tock/tock.git", rev = "release-2.2" }
riscv-csr = { git = "https://github.com/tock/tock.git", rev = "release-2.2" }
rv32i = { git = "https://github.com/tock/tock.git", rev = "release-2.2" }

# ufmt patch
ufmt = { git = "https://github.com/korran/ufmt.git", rev = "1d0743c1ffffc68bc05ca8eeb81c166192863f33", features = ["inline"] }
ufmt-write = { git = "https://github.com/korran/ufmt.git", rev = "1d0743c1ffffc68bc05ca8eeb81c166192863f33" }
ufmt-macros = { git = "https://github.com/korran/ufmt.git", rev = "1d0743c1ffffc68bc05ca8eeb81c166192863f33" }
